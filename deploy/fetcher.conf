# fetcher.conf — Apache 2.4 virtual host for FarFetched (local deployment)
#
# Serves the tool at http://localhost.fetcher/
# Pair this with a hosts-file entry on the machine you browse FROM (see README).
#
# Install:
#   - Debian/Ubuntu Apache: copy to /etc/apache2/sites-available/fetcher.conf
#       then:  a2ensite fetcher && systemctl reload apache2
#   - Generic httpd:         place in conf.d/ (or Include it) and reload.
#   - Adjust the two paths below to where you deployed the project.

<VirtualHost *:80>
    ServerName localhost.fetcher

    # Point at the webroot/ dir INSIDE the deployed project.
    DocumentRoot "/mnt/user/appdata/farfetched/webroot"

    <Directory "/mnt/user/appdata/farfetched/webroot">
        Options -Indexes +FollowSymLinks
        AllowOverride All          # lets the bundled .htaccess apply
        Require all granted        # LAN-only; not exposed to the internet
        DirectoryIndex index.php
    </Directory>

    # Defense in depth — even if .htaccess is ignored, never serve these:
    <FilesMatch "^(worker\.php)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(db|db-wal|db-shm|sqlite)$">
        Require all denied
    </FilesMatch>

    # Make sure the private/ dir (one level above webroot) is never web-served.
    # It lives outside DocumentRoot, but block explicitly in case of symlinks.
    <DirectoryMatch "/farfetched/private">
        Require all denied
    </DirectoryMatch>

    ErrorLog  "/mnt/user/appdata/farfetched/private/apache-error.log"
    CustomLog "/mnt/user/appdata/farfetched/private/apache-access.log" combined
</VirtualHost>
