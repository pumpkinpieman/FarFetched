# Container vhost — DocumentRoot is the bundled webroot/.
<VirtualHost *:80>
    DocumentRoot /var/www/html/webroot

    <Directory /var/www/html/webroot>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Never serve the CLI worker, the SQLite db, or the private state dir.
    <FilesMatch "^(worker\.php)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(db|db-wal|db-shm|sqlite)$">
        Require all denied
    </FilesMatch>
    <Directory /var/www/html/private>
        Require all denied
    </Directory>

    ErrorLog  /var/www/html/private/apache-error.log
    CustomLog /var/www/html/private/apache-access.log combined
</VirtualHost>
