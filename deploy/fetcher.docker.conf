# Container vhost — DocumentRoot is the bundled webroot/.
<VirtualHost *:80>
    DocumentRoot /var/www/html/webroot

    <Directory /var/www/html/webroot>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Never serve the CLI worker, the SQLite db, or the private state dir.
    <FilesMatch "^(worker\.php)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(db|db-wal|db-shm|sqlite)$">
        Require all denied
    </FilesMatch>
    <Directory /var/www/html/private>
        Require all denied
    </Directory>

    # Log to the container's stdout/stderr so `docker logs` (and Unraid's log
    # viewer) show Apache + PHP errors. Never write logs into the mounted
    # volume — a permission hiccup there must not stop Apache from starting.
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
